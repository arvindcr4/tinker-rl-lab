# E7 — Two-Phase Curriculum Reward (MATH Competition, Qwen3-8B)
# Phase 1 (steps 0-14): format reward only — teaches \boxed{} compliance
# Phase 2 (steps 15+): correctness reward — teaches correct answers
# Override phase boundary: CURRICULUM_PHASE1_STEPS=<n> env var
# Compare against math_qwen_8b.yaml (standard, answer-only reward)

env:
  group_size: 16
  batch_size: 128
  max_batches_offpolicy: 3
  tokenizer_name: "Qwen/Qwen3-8B"
  use_wandb: true
  rollout_server_url: "http://localhost:8000"
  wandb_name: "math-curriculum-env"
  ensure_scores_are_not_same: false
  max_token_length: 1024
  max_num_workers: 24
  total_steps: 50
  steps_per_eval: 10

openai:
  - model_name: "Qwen/Qwen3-8B"
    base_url: "http://localhost:8001/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 200

tinker:
  lora_rank: 32
  learning_rate: 0.00004
  max_token_trainer_length: 2048
  checkpoint_dir: "./checkpoints/math_curriculum_qwen8b/"
  save_checkpoint_interval: 10
  wandb_project: "tinker-rl-scaling"
  wandb_group: "math-curriculum"
  wandb_run_name: "math-curriculum-qwen3-8b"

slurm: false
testing: false
