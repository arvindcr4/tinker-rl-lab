# MATH Competition GRPO - Qwen3-14B
# Block H: benchmark transfer — does GRPO generalize beyond GSM8K?
# Addresses criticism: "100% GSM8K is not evidence of robust mathematical reasoning"
# wandb_group: math-scaling-ladder

env:
  group_size: 16
  batch_size: 128
  max_batches_offpolicy: 3
  tokenizer_name: "Qwen/Qwen3-14B"
  use_wandb: false
  rollout_server_url: "http://localhost:8040"
  wandb_name: "math-qwen3-14b-env"
  ensure_scores_are_not_same: false
  max_token_length: 1024
  max_num_workers: 24
  total_steps: 50
  steps_per_eval: 25

openai:
  - model_name: "Qwen/Qwen3-14B"
    base_url: "http://localhost:8041/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 256

tinker:
  lora_rank: 32
  learning_rate: 0.00003
  max_token_trainer_length: 2048
  checkpoint_dir: "./checkpoints/math_qwen14b/"
  save_checkpoint_interval: 10
  wandb_project: "tinker-rl-scaling"
  wandb_group: "math-scaling-ladder"
  wandb_run_name: "math-qwen3-14b"

slurm: false
testing: false
