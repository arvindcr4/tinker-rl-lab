# Tool Use GRPO - Qwen3-8B
# Experiment: Teach model to call tools correctly via GRPO
# Shared recipe: LoRA rank 32, LR 3-5e-5, batch 128, group 16, 50 steps

env:
  group_size: 16
  batch_size: 128
  max_batches_offpolicy: 3
  tokenizer_name: "Qwen/Qwen3-8B"
  use_wandb: true
  rollout_server_url: "http://localhost:8000"
  wandb_name: "tool-use-qwen3-8b-env"
  ensure_scores_are_not_same: false
  max_token_length: 512
  max_num_workers: 24
  total_steps: 50
  steps_per_eval: 10

openai:
  - model_name: "Qwen/Qwen3-8B"
    base_url: "http://localhost:8001/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 200

tinker:
  lora_rank: 32
  learning_rate: 0.00004
  max_token_trainer_length: 1024
  checkpoint_dir: "./checkpoints/tool_use_qwen8b/"
  save_checkpoint_interval: 10
  wandb_project: "tinker-rl-scaling"
  wandb_group: "tool-use-scaling"
  wandb_run_name: "tool-use-qwen3-8b"

slurm: false
testing: false
