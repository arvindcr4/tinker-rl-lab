# Block J: Tool-use cross-family — Llama-3.1-8B
env:
  group_size: 16
  batch_size: 128
  max_batches_offpolicy: 3
  tokenizer_name: "NousResearch/Meta-Llama-3.1-8B-Instruct"
  use_wandb: true
  rollout_server_url: "http://localhost:8030"
  wandb_name: "tool-use-llama3.1-8b-env"
  ensure_scores_are_not_same: false
  max_token_length: 512
  max_num_workers: 24
  total_steps: 50
  steps_per_eval: 10

openai:
  - model_name: "NousResearch/Meta-Llama-3.1-8B-Instruct"
    base_url: "http://localhost:8031/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 200

tinker:
  lora_rank: 32
  learning_rate: 0.00004
  max_token_trainer_length: 1024
  checkpoint_dir: "./checkpoints/10x/tool_use_llama8b/"
  save_checkpoint_interval: 10
  wandb_project: "tinker-structural-ceiling"
  wandb_group: "block-j-tool-cross-family"
  wandb_run_name: "tool-use-llama3.1-8b"
  tinker_model_name: "meta-llama/Llama-3.1-8B-Instruct"

slurm: false
testing: false
