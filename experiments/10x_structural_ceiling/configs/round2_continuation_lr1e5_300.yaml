# Round 2 Exp 1a: Continue LR=1e-5 to 300 steps (never saturated at 50)
# Purpose: Does the never-saturating config eventually catch up?
env:
  group_size: 16
  batch_size: 128
  max_batches_offpolicy: 3
  tokenizer_name: "Qwen/Qwen3-8B"
  use_wandb: true
  rollout_server_url: "http://localhost:8000"
  wandb_name: "gsm8k-qwen3-8b-lr1e5-300step-env"
  ensure_scores_are_not_same: false
  max_token_length: 512
  max_num_workers: 24
  total_steps: 300
  steps_per_eval: 50
  seed: 42

openai:
  - model_name: "Qwen/Qwen3-8B"
    base_url: "http://localhost:8001/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 256

tinker:
  lora_rank: 32
  learning_rate: 0.00001
  max_token_trainer_length: 2048
  checkpoint_dir: "./checkpoints/10x/gsm8k_qwen8b_lr1e5/"
  save_checkpoint_interval: 25
  wandb_project: "tinker-structural-ceiling"
  wandb_group: "round2-continuation"
  wandb_run_name: "gsm8k-qwen3-8b-lr1e-5-300step"

slurm: false
testing: false
