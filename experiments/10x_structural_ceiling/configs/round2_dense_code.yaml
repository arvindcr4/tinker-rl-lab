# Round 2 Exp 4: Code Dense Reward — HumanEval with graduated rewards
# Purpose: Does a richer reward signal rescue the code null?
env:
  group_size: 16
  batch_size: 64
  max_batches_offpolicy: 3
  tokenizer_name: "Qwen/Qwen3-8B"
  use_wandb: true
  rollout_server_url: "http://localhost:8050"
  wandb_name: "humaneval-dense-reward-env"
  ensure_scores_are_not_same: false
  max_token_length: 1024
  max_num_workers: 16
  total_steps: 100
  steps_per_eval: 25
  seed: 42
  reward_mode: "dense"

openai:
  - model_name: "Qwen/Qwen3-8B"
    base_url: "http://localhost:8051/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 164

tinker:
  lora_rank: 32
  learning_rate: 0.00004
  max_token_trainer_length: 2048
  checkpoint_dir: "./checkpoints/round2/humaneval_dense/"
  save_checkpoint_interval: 10
  wandb_project: "tinker-structural-ceiling"
  wandb_group: "round2-dense-code"
  wandb_run_name: "humaneval-dense-reward"

slurm: false
testing: false
