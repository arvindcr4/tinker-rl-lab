# Round 2 Exp 3c: Causal GU Phase Diagram — HARD bin (<20% base success)
# Purpose: Train only on prompts the model almost never solves — expect ZVF≈1
env:
  group_size: 16
  batch_size: 128
  max_batches_offpolicy: 3
  tokenizer_name: "Qwen/Qwen3-8B"
  use_wandb: true
  rollout_server_url: "http://localhost:8000"
  wandb_name: "gsm8k-phase-hard-env"
  ensure_scores_are_not_same: false
  max_token_length: 512
  max_num_workers: 24
  total_steps: 100
  steps_per_eval: 25
  seed: 42
  difficulty_bin: "hard"

openai:
  - model_name: "Qwen/Qwen3-8B"
    base_url: "http://localhost:8001/v1"
    api_key: "x"
    weight: 1.0
    num_requests_for_eval: 256

tinker:
  lora_rank: 32
  learning_rate: 0.00004
  max_token_trainer_length: 2048
  checkpoint_dir: "./checkpoints/round2/phase_hard/"
  save_checkpoint_interval: 10
  wandb_project: "tinker-structural-ceiling"
  wandb_group: "round2-phase-diagram"
  wandb_run_name: "gsm8k-phase-hard"

slurm: false
testing: false
