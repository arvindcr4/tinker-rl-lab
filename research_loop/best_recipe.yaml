# Current best GRPO recipe for the research loop.
# Updated by coordinator.py ingest after each wave.
#
# The coordinator will NOT downgrade this file — only replace a knob when a
# new variant beats the current best on 4+ seeds in the same phase.

name: baseline_v0
phase: 1
current_best_score: null           # last10_avg_accuracy — null until first wave
score_metric: last10_avg_accuracy
n_seeds_verified: 0

# ── Core knobs ─────────────────────────────────────────────────────────────
# Phase 1 proxy: Qwen3-4B-Instruct-2507. Tinker does not support Qwen3-0.6B/1.7B,
# and Llama-3.2-1B hit a transformers 5.4 import bug in this env. 4B is the
# smallest reliably-loadable proxy on Tinker.
model: Qwen/Qwen3.5-4B
seed: 42
rank: 16
steps: 100
lr: 3.0e-5
group_size: 8
batch: 2
temperature: 0.8
max_tokens: 512

# ── Exploration knobs (set by research_loop/train.py) ──────────────────────
adv_norm: std                       # std | none | rank
reward_shape: binary                # binary | graded | partial
curriculum: random                  # random | easy_first | hard_first

# ── Eval protocol ──────────────────────────────────────────────────────────
eval_subset: 500                    # how many GSM8K train examples to sample from
seed_pool: [0, 137, 256, 1024, 2047]   # Phase 2 multi-seed validation

# ── Lineage ────────────────────────────────────────────────────────────────
parent: null
wave: 0
agent: null
hypothesis: "Initial baseline — matches grpo_gsm8k_base.py defaults, Qwen3-4B-Instruct-2507 proxy"
